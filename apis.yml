aid: vocode
url: https://raw.githubusercontent.com/api-evangelist/vocode/refs/heads/main/apis.yml
name: Vocode
kind: company
description: Vocode is an open-source Python library (vocode-core, MIT licensed) for
  building real-time, streaming voice AI agents that run over phone calls, plus a
  hosted REST API at https://api.vocode.dev/v1 (Bearer API key) for placing and managing
  outbound and inbound phone calls, configuring agents, voices, prompts, actions,
  phone numbers, and webhooks without operating the streaming infrastructure yourself.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Voice AI
- Voice Agents
- Telephony
- Conversational AI
- Phone Calls
created: '2026-06-21'
modified: '2026-06-21'
specificationVersion: '0.19'
