- aid: vocode:vocode-realtime-streaming
  name: Vocode Realtime Streaming Conversation
  tags:
  - Realtime
  - Streaming
  - WebSocket
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.vocode.dev/open-source/how-it-works
  baseURL: https://api.vocode.dev/v1
  properties:
  - url: https://docs.vocode.dev/open-source/how-it-works
    type: Documentation
  - url: https://github.com/vocodedev/vocode-core/blob/main/vocode/streaming/streaming_conversation.py
    type: GitHub
  - url: review.yml
    type: Review
  description: Real-time, bidirectional streaming conversation pipeline (StreamingConversation)
    in the open-source library that wires transcription, agent response, and synthesis
    together; the hosted platform consumes telephony media-stream WebSockets, but
    no public client-facing wss conversation endpoint is documented in the hosted
    REST API.
