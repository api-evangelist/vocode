meters:
- name: call_minutes
  description: Minutes of hosted voice agent call time, metered monthly against the plan allowance.
  unit: minutes
  aggregation: sum
  dimensions:
  - account
  - plan
  - agent
- name: phone_number_rental
  description: Monthly rental for phone numbers bought through Vocode; pass-through telephony cost.
  unit: numbers
  aggregation: sum
  dimensions:
  - account
  - telephony_provider
- name: recording_storage
  description: Storage and retrieval of call recordings downloaded via /v1/calls/recording.
  unit: recordings
  aggregation: sum
  dimensions:
  - account
- name: oss_provider_passthrough
  description: >-
    Third-party STT / LLM / TTS / telephony spend incurred when self-hosting
    vocode-core; billed by those providers, not Vocode.
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - provider
principles:
- name: Visibility
  description: Poll GET /v1/usage for monthly_usage_minutes vs monthly_usage_limit_minutes; for self-hosted, aggregate spend across each underlying provider.
- name: Allocation
  description: Tag agents and phone numbers per workload/team; map hosted call minutes and number rentals to internal cost centers.
- name: Optimization
  description: Self-host vocode-core when volume justifies it to swap per-minute hosted billing for provider-rate control; pick cheaper STT/LLM/TTS providers; right-size voices and models per use case.
- name: Accountability
  description: Assign owners per agent/campaign; review monthly call-minute burn against the plan limit before overage.
