description: >-
  FinOps view of Vocode spend. The hosted Vocode platform bills usage-based
  per-call-minute charges metered against a monthly plan allowance
  (monthly_usage_minutes / monthly_usage_limit_minutes via GET /v1/usage),
  plus pass-through telephony costs for provisioned or linked phone numbers.
  The open-source vocode-core library carries no Vocode license cost; spend
  there is entirely the third-party STT, LLM, TTS, and telephony providers
  you configure. Public hosted per-minute rates are not published, so dollar
  figures here are unreconciled.
notes: >-
  Hosted per-minute rates and plan prices are not published on a public
  pricing page; verify with Vocode on reconciliation. For self-hosted
  vocode-core, track cost at each underlying provider (e.g. Deepgram /
  AssemblyAI STT, OpenAI / Anthropic LLM, ElevenLabs / Azure / PlayHt TTS,
  Twilio / Vonage telephony) rather than at Vocode.
