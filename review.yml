sources:
  - url: https://docs.vocode.dev/hosted-quickstart
    type: Documentation
    note: Hosted quickstart describes Python/Node SDKs and direct REST access; no public WebSocket endpoint.
  - url: https://docs.vocode.dev/api-reference/calls/create-call
    type: APIReference
    note: All documented hosted endpoints are HTTPS REST under https://api.vocode.dev/v1.
  - url: https://docs.vocode.dev/open-source/how-it-works
    type: Documentation
    note: Describes the StreamingConversation pipeline (STT -> agent -> TTS) used by the open-source library.
  - url: https://github.com/vocodedev/vocode-core/blob/main/vocode/streaming/streaming_conversation.py
    type: GitHub
    note: Open-source StreamingConversation implementation; real-time streaming lives in the library, bridged to telephony media-stream WebSockets.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    The hosted API is REST-only with HTTP webhooks for events; no public
    WebSocket endpoint with a documented message contract is exposed, so no
    AsyncAPI document was authored. The real-time WebSocket streaming that
    does exist is internal to the open-source vocode-core library and its
    telephony media-stream bridge. apis.yml models this as a distinct
    "Vocode Realtime Streaming Conversation" API pointing at the library and
    this review, and separately catalogs the open-source library, so OSS vs
    hosted surfaces are not conflated.
